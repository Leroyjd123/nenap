<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nenap — Hi-Fi Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Space+Grotesk:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================= TOKENS */
.np-root{
  /* type pairings (overridden by tweak) */
  --font-display:'Newsreader', Georgia, serif;
  --font-ui:'Hanken Grotesk', system-ui, sans-serif;
  --font-mono:'Spline Sans Mono', ui-monospace, monospace;

  /* warm calm palette */
  --bg:#faf8f2;
  --surface:#fffdf8;
  --surface-2:#f2efe5;
  --surface-3:#ece8db;
  --ink:#2a2823;
  --ink-2:#6e695b;
  --ink-3:#9b9484;
  --line:rgba(42,40,35,.10);
  --line-2:rgba(42,40,35,.17);

  --accent:#6f7d57;           /* sage (tweakable) */
  --rec:#b3705a;              /* recording clay */

  --accent-ink:#fff;
  --accent-tint:color-mix(in oklab, var(--accent) 13%, var(--surface));
  --accent-soft:color-mix(in oklab, var(--accent) 22%, var(--surface));
  --accent-line:color-mix(in oklab, var(--accent) 34%, transparent);
  --accent-deep:color-mix(in oklab, var(--accent) 78%, #20231a);
  --rec-tint:color-mix(in oklab, var(--rec) 14%, var(--surface));
  --rec-line:color-mix(in oklab, var(--rec) 40%, transparent);

  --r:14px;                   /* radius (tweakable) */
  --r-sm:calc(var(--r) * .62);
  --r-xs:calc(var(--r) * .42);

  /* density (tweakable via data-density) */
  --sp:7px;
  --fs:15px;
  --pad:18px;

  --shadow-1:0 1px 2px rgba(42,40,35,.05), 0 2px 8px rgba(42,40,35,.05);
  --shadow-2:0 8px 30px rgba(42,40,35,.13), 0 2px 8px rgba(42,40,35,.06);
}
.np-root[data-density="compact"]{ --sp:5px; --fs:14px; --pad:13px; }
.np-root[data-density="roomy"]{ --sp:10px; --fs:16px; --pad:24px; }

*{ box-sizing:border-box; }
html,body{ margin:0; }
body{ background:#e6e2d8; }

/* ============================================================= CANVAS */
.np-root{
  font-family:var(--font-ui);
  color:var(--ink);
  min-height:100vh;
  background:
    radial-gradient(1200px 600px at 50% -10%, #eeebe2, transparent 60%),
    #e6e2d8;
  padding:30px 34px 120px;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
.cv-head{ max-width:1340px; margin:0 auto 22px; display:flex; align-items:flex-end; gap:22px; flex-wrap:wrap; }
.cv-title{ font-family:var(--font-display); font-size:30px; font-weight:500; letter-spacing:-.01em; margin:0; }
.cv-title b{ font-weight:600; }
.cv-sub{ color:var(--ink-2); font-size:14px; margin:5px 0 0; max-width:520px; line-height:1.45; }
.cv-scenes{ margin-left:auto; display:flex; gap:5px; flex-wrap:wrap; align-items:center; }
.cv-scenes .lab{ font-family:var(--font-mono); font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-3); margin-right:4px; }
.scene-chip{
  font-family:var(--font-ui); font-size:13px; color:var(--ink-2);
  background:var(--surface); border:1px solid var(--line-2); border-radius:99px;
  padding:6px 13px; cursor:pointer; transition:.16s;
}
.scene-chip:hover{ color:var(--ink); border-color:var(--ink-3); }
.scene-chip.on{ background:var(--ink); color:#fff; border-color:var(--ink); }

.cv-stage{ max-width:1340px; margin:0 auto; display:flex; gap:34px; align-items:flex-start; justify-content:center; flex-wrap:wrap; }

/* device frame labels */
.frame-wrap{ display:flex; flex-direction:column; gap:11px; }
.frame-lab{ font-family:var(--font-mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-3); display:flex; align-items:center; gap:8px; }
.frame-lab::before{ content:""; width:7px; height:7px; border-radius:50%; background:var(--accent); }

/* ============================================================= BROWSER FRAME */
.browser{
  width:952px; background:var(--surface); border-radius:13px; overflow:hidden;
  box-shadow:var(--shadow-2); border:1px solid var(--line-2);
}
.browser-bar{ display:flex; align-items:center; gap:12px; padding:11px 15px; background:var(--surface-2); border-bottom:1px solid var(--line); }
.tl{ display:flex; gap:7px; }
.tl i{ width:11px; height:11px; border-radius:50%; display:block; }
.tl i:nth-child(1){ background:#e0a59a; } .tl i:nth-child(2){ background:#e6cf9b; } .tl i:nth-child(3){ background:#a8c79c; }
.browser-addr{ flex:1; max-width:420px; margin:0 auto; height:27px; background:var(--surface); border:1px solid var(--line-2); border-radius:8px; display:flex; align-items:center; justify-content:center; gap:7px; font-family:var(--font-mono); font-size:12px; color:var(--ink-2); }
.browser-addr svg{ color:var(--accent); opacity:.8; }
.browser-body{ height:632px; overflow:hidden; position:relative; }

/* ============================================================= PHONE FRAME */
.phone{
  width:322px; background:#1f1d18; border-radius:42px; padding:11px;
  box-shadow:var(--shadow-2);
}
.phone-screen{ background:var(--bg); border-radius:32px; overflow:hidden; position:relative; height:660px; }
.statusbar{ height:40px; display:flex; align-items:center; justify-content:space-between; padding:0 24px; font-family:var(--font-ui); font-size:13px; font-weight:600; color:var(--ink); position:relative; z-index:5; flex:none; }
.statusbar .dyn{ position:absolute; left:50%; top:9px; transform:translateX(-50%); width:78px; height:22px; background:#1f1d18; border-radius:14px; }
.statusbar .si{ display:flex; gap:5px; align-items:center; }
.statusbar .si i{ display:block; width:16px; height:10px; border:1.4px solid var(--ink); border-radius:2px; opacity:.85; }
.phone-app{ height:620px; display:flex; flex-direction:column; overflow:hidden; }

/* ============================================================= APP SHELL */
.app{ font-size:var(--fs); height:100%; display:flex; flex-direction:column; background:var(--bg); color:var(--ink); position:relative; overflow:hidden; }
.app *{ font-family:inherit; }
.scrollable{ overflow-y:auto; overflow-x:hidden; }
.scrollable::-webkit-scrollbar{ width:9px; }
.scrollable::-webkit-scrollbar-thumb{ background:var(--line-2); border-radius:9px; border:3px solid transparent; background-clip:padding-box; }

/* brand */
.brand{ font-family:var(--font-display); font-weight:600; letter-spacing:-.01em; display:inline-flex; align-items:baseline; }
.brand .dot{ color:var(--accent); }

/* ---- desktop layout: top bar + sidebar + content ---- */
.d-shell{ display:grid; grid-template-columns:220px 1fr; height:100%; }
.d-side{ background:var(--surface-2); border-right:1px solid var(--line); padding:18px 14px; display:flex; flex-direction:column; gap:3px; }
.d-side .brand{ font-size:23px; padding:4px 8px 16px; }
.side-lab{ font-family:var(--font-mono); font-size:10px; letter-spacing:.15em; text-transform:uppercase; color:var(--ink-3); padding:14px 8px 6px; }
.nav-item{ display:flex; align-items:center; gap:10px; padding:8px 9px; border-radius:var(--r-sm); color:var(--ink-2); cursor:pointer; font-size:14px; transition:.14s; }
.nav-item:hover{ background:color-mix(in oklab, var(--ink) 5%, transparent); color:var(--ink); }
.nav-item.on{ background:var(--accent-tint); color:var(--accent-deep); font-weight:600; }
.nav-item .ct{ margin-left:auto; font-family:var(--font-mono); font-size:11px; color:var(--ink-3); }
.nav-item.on .ct{ color:var(--accent-deep); opacity:.7; }
.nav-add{ color:var(--accent); }

.d-main{ display:flex; flex-direction:column; min-width:0; height:100%; }
.d-top{ display:flex; align-items:center; gap:14px; padding:14px var(--pad); border-bottom:1px solid var(--line); flex:none; background:color-mix(in oklab, var(--bg) 70%, var(--surface)); }
.d-content{ flex:1; }

/* ---- mobile shell ---- */
.m-top{ display:flex; align-items:center; justify-content:space-between; padding:6px var(--pad) 12px; flex:none; }
.m-top .brand{ font-size:21px; }
.m-body{ flex:1; padding:0 var(--pad) 16px; }
.m-tabbar{ display:flex; border-top:1px solid var(--line); background:color-mix(in oklab, var(--bg) 60%, var(--surface)); flex:none; padding:7px 8px calc(7px + env(safe-area-inset-bottom)); }
.m-tab{ flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--ink-3); font-size:10.5px; cursor:pointer; padding:3px; }
.m-tab.on{ color:var(--accent-deep); }
.m-fab{ position:absolute; right:16px; bottom:74px; display:flex; flex-direction:column; gap:11px; align-items:flex-end; z-index:8; }

/* ============================================================= PRIMITIVES */
.btn{ display:inline-flex; align-items:center; justify-content:center; gap:7px; font-family:var(--font-ui); font-size:14px; font-weight:600; line-height:1; border:1px solid transparent; border-radius:var(--r-sm); padding:9px 15px; cursor:pointer; transition:.15s; white-space:nowrap; background:none; color:var(--ink); }
.btn:hover{ transform:translateY(-1px); }
.btn:active{ transform:translateY(0); }
.btn-primary{ background:var(--accent); color:var(--accent-ink); box-shadow:0 1px 0 var(--accent-deep), var(--shadow-1); }
.btn-primary:hover{ background:var(--accent-deep); }
.btn-soft{ background:var(--surface); border-color:var(--line-2); color:var(--ink); box-shadow:var(--shadow-1); }
.btn-soft:hover{ border-color:var(--ink-3); }
.btn-ghost{ color:var(--ink-2); }
.btn-ghost:hover{ background:color-mix(in oklab, var(--ink) 6%, transparent); color:var(--ink); }
.btn-rec{ background:var(--rec-tint); color:var(--rec); border-color:var(--rec-line); }
.btn-rec:hover{ background:color-mix(in oklab, var(--rec) 20%, var(--surface)); }
.btn-sm{ padding:7px 12px; font-size:13px; }
.btn-lg{ padding:12px 20px; font-size:15px; }
.btn-icon{ padding:8px; border-radius:var(--r-sm); }
.btn-block{ width:100%; }

.input{ width:100%; font-family:var(--font-ui); font-size:14px; color:var(--ink); background:var(--surface); border:1px solid var(--line-2); border-radius:var(--r-sm); padding:10px 13px; outline:none; transition:.15s; }
.input::placeholder{ color:var(--ink-3); }
.input:focus{ border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-tint); }
.search-field{ display:flex; align-items:center; gap:9px; background:var(--surface); border:1px solid var(--line-2); border-radius:99px; padding:8px 15px; color:var(--ink-3); font-size:14px; transition:.15s; cursor:text; }
.search-field:hover{ border-color:var(--ink-3); }
.search-field input{ border:none; background:none; outline:none; font-family:inherit; font-size:14px; color:var(--ink); width:100%; }

.chip{ font-family:var(--font-ui); font-size:12.5px; color:var(--ink-2); background:var(--surface); border:1px solid var(--line-2); border-radius:99px; padding:5px 12px; cursor:pointer; transition:.14s; white-space:nowrap; display:inline-flex; align-items:center; gap:6px; }
.chip:hover{ border-color:var(--ink-3); }
.chip.on{ background:var(--accent-tint); color:var(--accent-deep); border-color:var(--accent-line); font-weight:600; }

.tag{ font-family:var(--font-mono); font-size:10.5px; letter-spacing:.04em; color:var(--accent-deep); background:var(--accent-tint); border-radius:5px; padding:3px 7px; white-space:nowrap; }
.tag.plain{ color:var(--ink-2); background:var(--surface-3); }

.meta{ font-family:var(--font-mono); font-size:11px; color:var(--ink-3); letter-spacing:.02em; }
.eyebrow{ font-family:var(--font-mono); font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-3); }

/* segmented control */
.seg{ display:inline-flex; background:var(--surface-3); border-radius:var(--r-sm); padding:3px; gap:2px; }
.seg span{ font-size:13px; font-weight:600; color:var(--ink-2); padding:6px 13px; border-radius:calc(var(--r-sm) - 2px); cursor:pointer; transition:.15s; white-space:nowrap; }
.seg span.on{ background:var(--surface); color:var(--ink); box-shadow:var(--shadow-1); }
.seg.block{ display:flex; } .seg.block span{ flex:1; text-align:center; }

/* avatar */
.av{ width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg, var(--accent-soft), var(--accent)); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:600; font-size:13px; flex:none; }

/* note card */
.note-card{ background:var(--surface); border:1px solid var(--line); border-radius:var(--r); padding:var(--pad); cursor:pointer; transition:.18s; box-shadow:var(--shadow-1); position:relative; overflow:hidden; }
.note-card:hover{ border-color:var(--accent-line); box-shadow:var(--shadow-2); transform:translateY(-2px); }
.note-card .nc-title{ font-family:var(--font-display); font-size:18px; font-weight:600; line-height:1.2; letter-spacing:-.01em; margin:0; }
.note-card .nc-ex{ color:var(--ink-2); font-size:13.5px; line-height:1.5; margin:8px 0 0; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.note-card .nc-foot{ display:flex; align-items:center; gap:8px; margin-top:14px; flex-wrap:wrap; }
.rec-dot{ width:8px; height:8px; border-radius:50%; background:var(--rec); flex:none; box-shadow:0 0 0 3px var(--rec-tint); }
.nc-rec{ display:inline-flex; align-items:center; gap:6px; color:var(--rec); font-family:var(--font-mono); font-size:10.5px; }

/* record pill + waveform */
.rec-pill{ display:inline-flex; align-items:center; gap:9px; background:var(--rec-tint); color:var(--rec); border:1px solid var(--rec-line); border-radius:99px; padding:6px 14px; font-family:var(--font-mono); font-size:13px; font-weight:500; }
.rec-pill .live{ width:9px; height:9px; border-radius:50%; background:var(--rec); animation:pulse 1.4s ease-in-out infinite; }
@keyframes pulse{ 0%,100%{ opacity:1; transform:scale(1); } 50%{ opacity:.35; transform:scale(.7); } }
.wave{ display:flex; align-items:center; gap:3px; height:46px; }
.wave i{ width:3.5px; border-radius:3px; background:var(--accent); display:block; opacity:.85; }
.wave.live i{ animation:wv 1s ease-in-out infinite; }
@keyframes wv{ 0%,100%{ transform:scaleY(.4); } 50%{ transform:scaleY(1); } }

/* prose (note content) */
.prose{ font-family:var(--font-display); color:var(--ink); }
.prose h3{ font-size:19px; font-weight:600; letter-spacing:-.01em; margin:22px 0 8px; }
.prose h3:first-child{ margin-top:0; }
.prose p{ font-size:16px; line-height:1.62; margin:0 0 10px; color:#3c3a32; }
.prose ul{ margin:0 0 10px; padding-left:0; list-style:none; display:flex; flex-direction:column; gap:8px; }
.prose li{ font-size:15.5px; line-height:1.5; color:#3c3a32; padding-left:24px; position:relative; }
.prose li::before{ content:""; position:absolute; left:6px; top:10px; width:6px; height:6px; border-radius:50%; background:var(--accent); }
.prose.mono{ font-family:var(--font-mono); }
.prose.mono p{ font-family:var(--font-mono); font-size:13.5px; line-height:1.75; color:var(--ink-2); }

/* divider */
.hr{ height:1px; background:var(--line); border:none; margin:0; }

/* placeholder lines (for dimmed/empty) */
.ph{ height:9px; border-radius:5px; background:var(--line); }
.ph.s{ width:40%; } .ph.m{ width:65%; } .ph.l{ width:88%; }

/* ============================================================= MODAL */
.scrim{ position:absolute; inset:0; background:rgba(38,36,30,.34); backdrop-filter:blur(3px); display:flex; align-items:center; justify-content:center; z-index:30; padding:22px; animation:fade .2s both; }
.sheet-scrim{ align-items:flex-end; padding:0; }
.modal{ width:100%; max-width:380px; background:var(--surface); border-radius:var(--r); box-shadow:var(--shadow-2); padding:22px; animation:pop .22s cubic-bezier(.2,.8,.3,1) both; }
.sheet{ width:100%; max-width:none; border-radius:var(--r) var(--r) 0 0; animation:slideup .26s cubic-bezier(.2,.8,.3,1) both; }
.modal h4{ font-family:var(--font-display); font-size:20px; font-weight:600; margin:0 0 3px; }
.modal .sub{ color:var(--ink-2); font-size:13.5px; margin:0 0 16px; line-height:1.45; }
.field-lab{ font-size:12px; font-weight:600; color:var(--ink-2); margin:13px 0 6px; display:block; }
.modal-foot{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:20px; }
@keyframes fade{ from{ opacity:0; } } 
@keyframes pop{ from{ opacity:0; transform:scale(.94) translateY(8px); } }
@keyframes slideup{ from{ transform:translateY(100%); } }

/* select-row */
.opt-row{ display:flex; align-items:center; gap:10px; padding:10px 12px; border:1px solid var(--line-2); border-radius:var(--r-sm); cursor:pointer; transition:.14s; margin-bottom:7px; }
.opt-row:hover{ border-color:var(--ink-3); }
.opt-row.on{ border-color:var(--accent); background:var(--accent-tint); }
.opt-row .rad{ width:17px; height:17px; border-radius:50%; border:1.6px solid var(--line-2); margin-left:auto; flex:none; }
.opt-row.on .rad{ border-color:var(--accent); border-width:5px; }

/* toast */
.toast{ position:absolute; left:50%; bottom:22px; transform:translateX(-50%); background:var(--ink); color:#fff; font-size:13px; font-weight:500; padding:10px 16px; border-radius:99px; box-shadow:var(--shadow-2); z-index:40; display:flex; align-items:center; gap:9px; animation:toast .3s both; white-space:nowrap; }
.toast .t-dot{ color:#a8c79c; display:flex; }
@keyframes toast{ from{ opacity:0; transform:translate(-50%,12px); } }

/* ============================================================= AI ENHANCING MOMENT */
.enhancing{ position:absolute; inset:0; background:color-mix(in oklab, var(--bg) 86%, var(--accent)); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; z-index:24; animation:fade .25s both; }
.enh-orb{ position:relative; width:74px; height:74px; }
.enh-orb .ring{ position:absolute; inset:0; border-radius:50%; border:2px solid var(--accent-line); }
.enh-orb .ring.r2{ inset:-12px; opacity:.5; animation:breathe 2.4s ease-in-out infinite; }
.enh-orb .ring.r3{ inset:-24px; opacity:.25; animation:breathe 2.4s ease-in-out .3s infinite; }
.enh-orb .core{ position:absolute; inset:18px; border-radius:50%; background:radial-gradient(circle at 35% 30%, var(--accent-soft), var(--accent)); color:#fff; display:flex; align-items:center; justify-content:center; box-shadow:0 6px 24px var(--accent-line); animation:spin 3.4s linear infinite; }
@keyframes breathe{ 0%,100%{ transform:scale(1); opacity:.4; } 50%{ transform:scale(1.12); opacity:.15; } }
@keyframes spin{ to{ transform:rotate(360deg); } }
.enh-label{ font-family:var(--font-display); font-size:19px; font-weight:500; color:var(--accent-deep); }
.enh-steps{ font-family:var(--font-mono); font-size:11.5px; color:var(--ink-2); letter-spacing:.02em; text-align:center; min-height:16px; }
.enh-bar{ width:160px; height:4px; border-radius:9px; background:var(--accent-tint); overflow:hidden; }
.enh-bar i{ display:block; height:100%; background:var(--accent); border-radius:9px; transition:width .3s linear; }

/* reveal */
.reveal{ animation:reveal .6s cubic-bezier(.2,.7,.3,1) both; }
@keyframes reveal{ from{ opacity:0; transform:translateY(10px); filter:blur(4px); } }
.reveal-1{ animation-delay:.05s; } .reveal-2{ animation-delay:.16s; } .reveal-3{ animation-delay:.28s; }
.shimmer{ background:linear-gradient(100deg, transparent 30%, var(--accent-tint) 50%, transparent 70%); background-size:200% 100%; animation:shimmer 1.4s linear infinite; }
@keyframes shimmer{ to{ background-position:-200% 0; } }

/* fade between screens */
.screen{ animation:scFade .26s ease both; height:100%; }
@keyframes scFade{ from{ opacity:0; } }

/* misc layout helpers */
.row{ display:flex; align-items:center; gap:var(--sp); }
.between{ justify-content:space-between; }
.col{ display:flex; flex-direction:column; }
.wrap{ flex-wrap:wrap; }
.grow{ flex:1; min-width:0; }
.center{ align-items:center; justify-content:center; }

.hscroll{ scrollbar-width:none; -ms-overflow-style:none; }
.hscroll::-webkit-scrollbar{ display:none; }
.np-editor::placeholder{ color:var(--ink-3); }
.comment-chip{ display:inline-flex; align-items:center; gap:7px; font-family:var(--font-ui); font-size:12.5px; color:var(--accent-deep); background:var(--accent-tint); border:1px dashed var(--accent-line); border-radius:var(--r-sm); padding:7px 11px; margin:8px 0; cursor:pointer; }
.comment-chip:hover{ background:var(--accent-soft); }

#tweaks-root{ position:fixed; z-index:200; }
</style>
</head>

<template id="__bundler_thumbnail">
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" rx="20" fill="#6f7d57"/><text x="50" y="64" font-family="Georgia, serif" font-size="52" font-weight="600" fill="#faf8f2" text-anchor="middle">N</text></svg>
</template>
